<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Benicio Vazquez — Campeonato de Andalucía 2026</title>
<style>
:root{
  --blue:#0055cc;--blue-l:#dbeafe;
  --gold:#f59e0b;--gold-l:#fef9c3;--gold-d:#b45309;
  --green:#059669;--green-l:#d1fae5;
  --orange:#ea580c;--orange-l:#ffedd5;
  --red:#dc2626;--red-l:#fee2e2;
  --soft:#64748b;--dark:#0f172a;--mid:#94a3b8;
  --bg:#f1f5f9;--card:#fff;--radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--dark);font-size:15px}
/* Hero */
.hero{background:linear-gradient(135deg,#0f172a 0%,#1e3a8a 100%);color:#fff;padding:28px 20px 20px;text-align:center}
.hero-icon{font-size:3rem;margin-bottom:8px}
.hero h1{font-size:1.55rem;font-weight:700;margin-bottom:4px}
.hero p{font-size:.9rem;color:#93c5fd;margin-bottom:14px}
.pills{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:16px}
.pill{padding:4px 12px;border-radius:20px;font-size:.8rem;font-weight:600}
.pill-grey{background:rgba(255,255,255,.15);color:#e2e8f0}
.pill-gold{background:var(--gold);color:#1c0a00}
.pill-blue{background:var(--blue-l);color:var(--blue)}
.sc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;max-width:600px;margin:0 auto}
.sc{background:rgba(255,255,255,.1);border-radius:var(--radius);padding:12px 8px;text-align:center}
.sc .val{font-size:1.6rem;font-weight:800;color:#fbbf24}
.sc .lbl{font-size:.72rem;color:#93c5fd;margin-top:2px}
/* Tabs */
.tabs{display:flex;overflow-x:auto;background:#fff;border-bottom:2px solid #e2e8f0;position:sticky;top:0;z-index:10;gap:0}
.tab{flex:1;min-width:80px;padding:11px 4px;border:none;background:none;font-size:.78rem;font-weight:600;color:var(--soft);cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s}
.tab:hover{color:var(--blue);background:#f8fafc}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);background:#fff}
/* Sections */
.sec{display:none;padding:16px 12px;max-width:900px;margin:0 auto}
.sec.active{display:block}
.sh{font-size:1rem;font-weight:700;color:var(--dark);margin:20px 0 10px;display:flex;align-items:center;gap:8px}
.sh:first-child{margin-top:0}
.sh::after{content:'';flex:1;height:2px;background:#e2e8f0}
/* Tables */
.tbl-wrap{overflow-x:auto;border-radius:var(--radius);box-shadow:0 1px 4px rgba(0,0,0,.08)}
table.ct{width:100%;border-collapse:collapse;background:var(--card);font-size:.82rem}
table.ct th{background:#f8fafc;padding:8px 10px;text-align:left;font-weight:600;color:var(--soft);font-size:.76rem;border-bottom:2px solid #e2e8f0;white-space:nowrap}
table.ct td{padding:8px 10px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
table.ct tr:last-child td{border-bottom:none}
table.ct tr:hover td{background:#f8fafc}
/* Benicio row */
tr.ben td{background:var(--gold-l)!important;font-weight:600}
tr.ben td.t-tiempo{font-weight:800;font-size:.96rem}
/* Sin marca */
tr.nm td{color:var(--mid);font-style:italic}
/* Tiempo destacado */
td.t-tiempo{font-weight:700;font-size:.9rem;font-family:'SF Mono',monospace,sans-serif}
/* Diferencia */
td.dif-neg{color:var(--red);font-weight:600}    /* más rápido que Benicio */
td.dif-pos{color:var(--green);font-weight:600}  /* más lento (Benicio adelante) */
td.dif-zero{color:var(--gold-d);font-weight:700}
/* Zone badges */
.z-ori{background:var(--blue-l);color:var(--blue);padding:2px 8px;border-radius:20px;font-size:.72rem;font-weight:700;white-space:nowrap}
.z-occ{background:var(--orange-l);color:var(--orange);padding:2px 8px;border-radius:20px;font-size:.72rem;font-weight:700;white-space:nowrap}
/* Rank badge */
.rb{display:inline-block;width:26px;height:26px;border-radius:50%;font-size:.75rem;font-weight:800;text-align:center;line-height:26px}
.rb-1{background:#fde68a;color:#92400e}
.rb-2{background:#e2e8f0;color:#334155}
.rb-3{background:#fcd9a0;color:#92400e}
.rb-n{background:#f1f5f9;color:var(--soft)}
/* Callout */
.callout{border-radius:var(--radius);padding:12px 14px;margin:12px 0;font-size:.85rem}
.callout.blue{background:var(--blue-l);border-left:4px solid var(--blue)}
.callout.green{background:var(--green-l);border-left:4px solid var(--green)}
.callout.orange{background:var(--orange-l);border-left:4px solid var(--orange)}
.callout.gold{background:var(--gold-l);border-left:4px solid var(--gold)}
/* Análisis — barra de comparación */
.ana-block{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.ana-title{font-size:1rem;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.ana-rank{font-size:.78rem;color:var(--soft);font-weight:400}
.cmp-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;font-size:.82rem}
.cmp-bar-wrap{flex:1;background:#f1f5f9;border-radius:4px;height:12px;overflow:hidden}
.cmp-bar{height:100%;border-radius:4px;transition:width .3s}
.cmp-bar-ben{background:var(--gold)}
.cmp-bar-ori{background:var(--blue-l)}
.cmp-bar-and{background:#e2e8f0}
.cmp-info{width:200px;flex-shrink:0;font-size:.78rem}
.cmp-info strong{display:block;font-weight:700}
.cmp-info span{color:var(--soft)}
.dif-badge{padding:2px 8px;border-radius:12px;font-size:.75rem;font-weight:700;white-space:nowrap}
.dif-badge.red{background:var(--red-l);color:var(--red)}
.dif-badge.green{background:var(--green-l);color:var(--green)}
.dif-badge.gold{background:var(--gold-l);color:var(--gold-d)}
/* Prueba card heading */
.prueba-hd{font-size:.95rem;font-weight:700;color:var(--dark);margin:18px 0 6px;display:flex;align-items:center;gap:6px}
.prueba-hd .cnt{font-size:.72rem;color:var(--soft);font-weight:400}
/* Footer */
.footer{text-align:center;padding:20px;font-size:.75rem;color:var(--mid)}
</style>
</head>

// ── utilidades ────────────────────────────────────────────────────────────────
function fmtDif(d){
  if(d===null||d===undefined)return'—';
  const s=d>=0?'+':'-';
  return s+(Math.abs(d)/100).toFixed(2)+'s';
}
function fmtTiempo(cs){
  if(!cs)return'—';
  const m=Math.floor(cs/6000),r=cs%6000,s=Math.floor(r/100),c=r%100;
  if(m>0)return m+':'+(s<10?'0':'')+s+'.'+(c<10?'0':'')+c;
  return s+'.'+(c<10?'0':'')+c;
}
function rbClass(r){
  if(r===1)return'rb rb-1';if(r===2)return'rb rb-2';if(r===3)return'rb rb-3';return'rb rb-n';
}
function zBadge(z){
  if(z==='Oriental') return '<span class="z-ori">🔵 Oriental</span>';
  if(z==='Occidental') return '<span class="z-occ">🟠 Occidental</span>';
  return z||'—';
}
function difCell(d,isB){
  if(isB) return '<td class="dif-zero">★</td>';
  if(d===null||d===undefined) return '<td>—</td>';
  const cls = d<0 ? 'dif-neg':'dif-pos';
  return '<td class="'+cls+'">'+fmtDif(d)+'</td>';
}
function goTab(id,el){
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('sec-'+id).classList.add('active');
  el.classList.add('active');
}

// ── Tabla genérica de zona ────────────────────────────────────────────────────
function makeEventTable(prueba, swimmers, showZone){
  if(!swimmers||swimmers.length===0)
    return '<p style="color:var(--mid);font-style:italic;padding:8px 0">Sin nadadores de esta zona</p>';

  let h='<div class="tbl-wrap"><table class="ct"><thead><tr>'+
    '<th>#</th><th>Nombre</th><th>Club</th>'+
    (showZone?'<th>Zona</th>':'')+
    '<th>Provincia</th><th>Marca</th>'+
    '<th>Dif. vs Benicio</th></tr></thead><tbody>';

  for(const sw of swimmers){
    const cls=sw.b?' class="ben"':'';
    const rb=`<span class="${rbClass(sw.r)}">${sw.r}</span>`;
    const zc=showZone?'<td>'+zBadge(sw.z)+'</td>':'';
    const dif=difCell(sw.d,sw.b);
    h+=`<tr${cls}>
      <td>${rb}</td>
      <td>${sw.n}${sw.b?' <strong style="color:var(--gold-d)">★ Tú</strong>':''}</td>
      <td style="font-size:.75rem">${sw.c}</td>
      ${zc}
      <td style="font-size:.75rem">${sw.p||'—'}</td>
      <td class="t-tiempo">${sw.m}</td>
      ${dif}
    </tr>`;
  }
  h+='</tbody></table></div>';
  return h;
}

// ── Tab 5: Análisis ──────────────────────────────────────────────────────────
function renderAna(){
  let h='<div class="callout green" style="margin-bottom:16px">'+
    '📊 <strong>Análisis por prueba</strong> · Las barras comparan el tiempo de Benicio '+
    'con el líder de Andalucía y de Zona Oriental. El porcentaje indica cuánto tiempo '+
    'te separa del 1º.</div>';

  const races=DATA.b.races;

  if(races.length===0){
    h+='<p>No hay marcas registradas.</p>';
    document.getElementById('sec-ana').innerHTML=h;
    return;
  }

  // Barras de comparación por prueba
  for(const r of races){
    const ev=DATA.ev[r.prueba];
    const top_and=ev&&ev.and.length>0?ev.and[0]:null;
    const top_ori=ev&&ev.ori.length>0?ev.ori[0]:null;

    // Base para las barras: tiempo más lento entre los top-5 AND
    const maxCs = ev ? Math.max(...ev.and.slice(0,8).map(s=>s.cs)) : r.cs*1.05;
    const minCs = top_and ? top_and.cs : r.cs;
    const range = maxCs - minCs || 1;

    function pct(cs){ return Math.min(100, Math.max(1, ((cs-minCs)/range)*100)).toFixed(1); }

    const difAndStr = r.ld_and!==null ? fmtDif(r.ld_and) : '—';
    const difOriStr = r.ld_ori!==null ? fmtDif(r.ld_ori) : '—';

    // Nadador justo delante y justo detrás de Benicio en Andalucía
    const listaAnd = ev ? ev.and : [];
    const idxB = listaAnd.findIndex(s=>s.b);
    const delante = idxB > 0 ? listaAnd[idxB-1] : null;
    const detras  = idxB >= 0 && idxB < listaAnd.length-1 ? listaAnd[idxB+1] : null;

    h+=`<div class="ana-block">
      <div class="ana-title">

        <span class="ana-rank">Puesto #${r.ra} de ${r.ta} en Andalucía &nbsp;·&nbsp; #${r.ro} de ${r.to} en Zona Oriental</span>

    h+=`<div style="margin-bottom:12px">`;

      h+=`<div class="cmp-row">

    }
    if(top_ori && top_ori.cs !== (top_and?top_and.cs:null)){
      h+=`<div class="cmp-row">

        <span class="dif-badge red">${difOriStr}</span>
      </div>`;
    }
    if(delante){
      const difDel = r.cs - delante.cs;
      h+=`<div class="cmp-row">

      h+=`<div class="callout ${r.ra<=3?'green':r.ra<=10?'blue':'orange'}" style="margin-top:4px;font-size:.82rem">`;
      if(r.ra===1)
        h+=`🏆 ¡<strong>Líder de Andalucía</strong> en ${r.prueba}!`;
      else if(delante)
        h+=`💡 Para subir al puesto <strong>#${r.ra-1}</strong> necesitas mejorar <strong>${((r.cs-delante.cs)/100).toFixed(2)}s</strong> · Superar a <strong>${delante.n}</strong> (${delante.c})`;
      if(r.ld_and>0)
        h+=`<br>⏱ Diferencia al líder AND: <strong>${(r.ld_and/100).toFixed(2)}s</strong> (${pctDif}% más lento)`;
      h+='</div>';
    }

    h+='</div>';  // ana-block
  }

  // Pruebas sin marca
  const rMap={};
  for(const r of races) rMap[r.prueba]=true;
  const sinMarca=DATA.pruebas.filter(p=>!rMap[p]);
  if(sinMarca.length>0){
    h+=`<div class="sh">Pruebas sin marca registrada</div>`;
    h+=`<div class="callout blue" style="font-size:.83rem">`;
    h+=`<strong>Estas pruebas no tienen tiempo en el ranking nacional esta temporada. `;
    h+=`Participar en alguna competición y registrar un tiempo abriría nuevas opciones para el campeonato.</strong><br><br>`;
    for(const p of sinMarca){
      const ev=DATA.ev[p];
      const top=ev&&ev.and.length>0?ev.and[0]:null;
      h+=`<strong>${p}</strong>`;
      if(top) h+=` — Lider AND: ${top.m} (${top.n} · ${top.c})`;
      h+='<br>';
    }
    h+=`</div>`;
  }

  document.getElementById('sec-ana').innerHTML=h;
}

// ── Init ─────────────────────────────────────────────────────────────────────
renderHero();
renderPruebas();
renderCamp();
renderOri();
renderOcc();
renderAna();
</script>
