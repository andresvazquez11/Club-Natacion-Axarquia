<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Club Natación Axarquía — Jóvenes 2015/2016 · Campeonato de Andalucía</title>
<style>
:root{
  --blue:#0055cc;--blue-l:#dbeafe;
  --pink:#db2777;--pink-l:#fce7f3;
  --green:#059669;--green-l:#d1fae5;
  --purple:#7c3aed;--purple-l:#ede9fe;
  --gold:#f59e0b;--gold-l:#fef9c3;--gold-d:#b45309;
  --orange:#ea580c;--orange-l:#ffedd5;
  --red:#dc2626;--red-l:#fee2e2;
  --soft:#64748b;--dark:#0f172a;--mid:#94a3b8;
  --bg:#f1f5f9;--card:#fff;--radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--dark);font-size:15px}

/* ── Hero ── */
.hero{background:linear-gradient(135deg,#0f172a 0%,#1e3a8a 60%,#581c87 100%);color:#fff;padding:24px 16px 18px;text-align:center}
.hero h1{font-size:1.4rem;font-weight:800;margin-bottom:3px}
.hero p{font-size:.85rem;color:#93c5fd;margin-bottom:14px}
.pills{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:14px}
.pill{padding:3px 11px;border-radius:20px;font-size:.78rem;font-weight:600}
.pg{background:var(--gold);color:#1c0a00}
.pb{background:rgba(255,255,255,.15);color:#e2e8f0}
.sc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-width:420px;margin:0 auto}
.sc{background:rgba(255,255,255,.1);border-radius:8px;padding:10px 6px;text-align:center}
.sc .val{font-size:1.5rem;font-weight:800;color:#fbbf24}
.sc .lbl{font-size:.7rem;color:#93c5fd;margin-top:2px}

/* ── Highlights strip ── */
.hl-strip{background:#fff;border-bottom:1px solid #e2e8f0;padding:10px 14px;overflow-x:auto;white-space:nowrap;font-size:.78rem}
.hl-item{display:inline-flex;align-items:center;gap:6px;margin-right:14px;background:#f8fafc;border-radius:20px;padding:4px 10px;border:1px solid #e2e8f0}
.hl-rank{font-weight:800;font-size:.85rem}
.hl-n1{color:var(--gold-d);background:var(--gold-l);border-color:var(--gold)}
.hl-top5{color:var(--green);background:var(--green-l);border-color:var(--green)}
.hl-top10{color:var(--blue);background:var(--blue-l);border-color:var(--blue)}

/* ── Category tabs ── */
.cat-tabs{display:flex;background:#fff;border-bottom:2px solid #e2e8f0;overflow-x:auto}
.cat-tab{flex:1;min-width:100px;padding:12px 6px;border:none;background:none;
  font-size:.82rem;font-weight:700;cursor:pointer;color:var(--soft);
  border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap}
.cat-tab:hover{background:#f8fafc}
.cat-tab.act{border-bottom-color:var(--tab-col,var(--blue));color:var(--tab-col,var(--blue))}

/* ── Category content ── */
.cat-sec{display:none;padding:14px 12px;max-width:960px;margin:0 auto}
.cat-sec.act{display:block}

/* ── Swimmer grid ── */
.sw-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:16px}
.sw-card{background:var(--card);border-radius:var(--radius);padding:13px 12px;
  cursor:pointer;border:2px solid #e2e8f0;transition:all .15s;user-select:none}
.sw-card:hover{border-color:var(--cat-col,var(--blue));background:#f8fafc;transform:translateY(-1px)}
.sw-card.sel{border-color:var(--cat-col,var(--blue));background:var(--blue-l);box-shadow:0 2px 8px rgba(0,85,204,.15)}
.sw-name{font-weight:700;font-size:.85rem;margin-bottom:4px;line-height:1.3}
.sw-meta{font-size:.73rem;color:var(--soft);margin-bottom:4px}
.sw-rank{font-size:.8rem;font-weight:800;color:var(--cat-col,var(--blue))}

/* ── Swimmer detail panel ── */
#sw-detail{display:none;background:var(--card);border-radius:var(--radius);
  margin-top:4px;box-shadow:0 2px 12px rgba(0,0,0,.08);overflow:hidden}
.sw-det-hdr{padding:16px 16px 10px;border-bottom:2px solid #f1f5f9;background:#f8fafc}
.sw-det-hdr h2{font-size:1.2rem;font-weight:800;margin-bottom:4px}
.sw-det-body{padding:14px}

/* ── Sub-tabs within swimmer detail ── */
.sub-tabs{display:flex;border-bottom:1px solid #e2e8f0;margin-bottom:14px;overflow-x:auto}
.sub-tab{padding:8px 14px;border:none;background:none;font-size:.8rem;font-weight:600;
  color:var(--soft);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.sub-tab.act{color:var(--blue);border-bottom-color:var(--blue)}
.sub-sec{display:none}.sub-sec.act{display:block}

/* ── Tables ── */
.tbl-wrap{overflow-x:auto;border-radius:var(--radius);box-shadow:0 1px 4px rgba(0,0,0,.06)}
table.ct{width:100%;border-collapse:collapse;background:var(--card);font-size:.8rem}
table.ct th{background:#f8fafc;padding:7px 9px;text-align:left;font-weight:600;
  color:var(--soft);font-size:.73rem;border-bottom:2px solid #e2e8f0;white-space:nowrap}
table.ct td{padding:7px 9px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
table.ct tr:last-child td{border-bottom:none}
table.ct tr:hover td{background:#f8fafc}
tr.ax td{background:rgba(245,158,11,.12)!important;font-weight:600}
tr.ax td.tt{font-weight:800}
tr.nm td{color:var(--mid);font-style:italic}
td.tt{font-weight:700;font-family:'SF Mono',monospace;font-size:.85rem}
td.dn{color:var(--red);font-weight:600}
td.dp{color:var(--green);font-weight:600}

/* ── Zone badges ── */
.zo{padding:2px 7px;border-radius:20px;font-size:.7rem;font-weight:700;white-space:nowrap}
.zo-ori{background:var(--blue-l);color:var(--blue)}
.zo-occ{background:var(--orange-l);color:var(--orange)}

/* ── Rank badge ── */
.rb{display:inline-block;width:24px;height:24px;border-radius:50%;
  font-size:.7rem;font-weight:800;text-align:center;line-height:24px}
.rb1{background:#fde68a;color:#92400e}
.rb2{background:#e2e8f0;color:#334155}
.rb3{background:#fcd9a0;color:#92400e}
.rbn{background:#f1f5f9;color:var(--soft)}

/* ── Análisis bars ── */
.ana-block{border-radius:var(--radius);border:1px solid #e2e8f0;padding:14px;margin-bottom:12px}
.ana-title{font-weight:700;font-size:.95rem;margin-bottom:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ana-rnk{font-size:.75rem;color:var(--soft);font-weight:400}
.cmp-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:.78rem;flex-wrap:nowrap}
.cmp-info{width:190px;flex-shrink:0}
.cmp-info strong{display:block;font-weight:700;font-size:.8rem}
.cmp-info span{color:var(--soft);font-size:.7rem}
.bar-wrap{flex:1;background:#f1f5f9;border-radius:4px;height:10px;overflow:hidden;min-width:60px}
.bar{height:100%;border-radius:4px}
.bar-g{background:#e2e8f0}
.bar-b{background:var(--gold)}
.bar-ldr{background:#fca5a5}
.bar-nx{background:#bbf7d0}
.cmp-t{width:64px;flex-shrink:0;text-align:right;font-family:monospace;font-weight:700;font-size:.8rem}
.dif-b{padding:2px 7px;border-radius:12px;font-size:.72rem;font-weight:700;white-space:nowrap;flex-shrink:0}
.db-r{background:var(--red-l);color:var(--red)}
.db-g{background:var(--green-l);color:var(--green)}
.db-gold{background:var(--gold-l);color:var(--gold-d)}

/* ── Callouts ── */
.co{border-radius:var(--radius);padding:10px 13px;margin:10px 0;font-size:.82rem;line-height:1.5}
.co-blue{background:var(--blue-l);border-left:4px solid var(--blue)}
.co-green{background:var(--green-l);border-left:4px solid var(--green)}
.co-gold{background:var(--gold-l);border-left:4px solid var(--gold)}
.co-orange{background:var(--orange-l);border-left:4px solid var(--orange)}
.co-red{background:var(--red-l);border-left:4px solid var(--red)}

/* ── Section headings ── */
.sh{font-size:.9rem;font-weight:700;margin:16px 0 8px;display:flex;align-items:center;gap:8px}
.sh::after{content:'';flex:1;height:2px;background:#e2e8f0}

/* ── Footer ── */
.footer{text-align:center;padding:18px;font-size:.72rem;color:var(--mid)}

@media(max-width:480px){
  .sc-grid{grid-template-columns:repeat(2,1fr)}
  .sw-grid{grid-template-columns:repeat(2,1fr)}
  .cmp-info{width:130px}
}
</style>
</head>

// ── Utils ──────────────────────────────────────────────────────────────────────
function fmtDif(d){
  if(d===null||d===undefined) return'—';
  return (d>=0?'+':'-')+(Math.abs(d)/100).toFixed(2)+'s';
}
function rbCls(r){
  return r===1?'rb rb1':r===2?'rb rb2':r===3?'rb rb3':'rb rbn';
}
function zBadge(z){
  if(z==='Oriental')  return'<span class="zo zo-ori">🔵 ORI</span>';
  if(z==='Occidental')return'<span class="zo zo-occ">🟠 OCC</span>';
  return z||'—';
}
function difCell(d, isAx){
  if(isAx) return'<td style="color:var(--gold-d);font-weight:800">★</td>';
  if(d===null||d===undefined) return'<td>—</td>';
  return d<0
    ? '<td class="dn">'+fmtDif(d)+'</td>'
    : '<td class="dp">'+fmtDif(d)+'</td>';
}

function renderHero(){
  const s=DATA.sum;
  document.getElementById('pill-sw').textContent = s.total_sw+' nadadores';
  document.getElementById('pill-n1').textContent = s.n1_count+' posiciones #1 nacional';

  document.getElementById('stat-cards').innerHTML=
    `<div class="sc"><div class="val">${s.total_sw}</div><div class="lbl">Nadadores</div></div>`+
    `<div class="sc"><div class="val">${s.n1_count}</div><div class="lbl">#1 España</div></div>`+
    `<div class="sc"><div class="val">${s.top5_count}</div><div class="lbl">Top-5 nac.</div></div>`+
    `<div class="sc"><div class="val">4</div><div class="lbl">Categorías</div></div>`;

  const hl=DATA.highlights;
  if(!hl||!hl.length){ document.getElementById('hl-strip').innerHTML=''; return; }
  let h='<strong style="margin-right:10px">🌟 Mejores nacionales:</strong>';
  for(const hi of hl){
    const cls = hi.rn===1?'hl-item hl-n1':hi.rn<=5?'hl-item hl-top5':'hl-item hl-top10';
    h+=`<span class="${cls}"><span class="hl-rank">#${hi.rn}🇪🇸</span> ${hi.nombre.split(' ')[0]} · ${hi.prueba} · <strong>${hi.m}</strong></span>`;
  }
  document.getElementById('hl-strip').innerHTML=h;
}

// ── Category tabs ────────────────────────────────────────────────────────────
const CAT_COLORS = {
  '2015M':'#0055cc','2015F':'#db2777','2016M':'#059669','2016F':'#7c3aed'
};
let selCat = Object.keys(DATA.categorias)[0];
let selSwIdx = null;

function renderCatTabs(){
  const tb=document.getElementById('cat-tabs');
  const sc=document.getElementById('cat-sections');
  let tabH='', secH='';
  for(const [key,cat] of Object.entries(DATA.categorias)){
    const isFirst = key===selCat;
    tabH+=`<button class="cat-tab${isFirst?' act':''}" id="ctab-${key}"
      style="--tab-col:${CAT_COLORS[key]}"
      onclick="goCategoria('${key}',this)">${cat.label}</button>`;
    secH+=`<div class="cat-sec${isFirst?' act':''}" id="cat-${key}">
      ${buildCatSection(key,cat)}
    </div>`;
  }
  tb.innerHTML=tabH;
  sc.innerHTML=secH;
}

function buildCatSection(key, cat){
  const col = CAT_COLORS[key];
  let h=`<div class="co co-blue" style="margin-bottom:12px">
    <strong>${cat.n_sw} nadadores del club</strong> en esta categoría ·
    Zona Oriental (Málaga) · Haz clic en un nadador para ver su análisis completo.</div>`;

  h+='<div class="sw-grid" style="--cat-col:'+col+'">';
  for(let i=0;i<cat.swimmers.length;i++){
    const sw=cat.swimmers[i];
    const s=sw.sum;
    const rankStr = s.bra ? '#'+s.bra+' AND' : '—';
    const rankNStr= s.brn ? '#'+s.brn+'🇪🇸' : '';
    h+=`<div class="sw-card" id="swcard-${key}-${i}"
      style="--cat-col:${col}"
      onclick="selectSwimmer('${key}',${i})">
      <div class="sw-name">${sw.nombre}</div>
      <div class="sw-meta">${s.np} prueba${s.np!==1?'s':''}</div>
      <div class="sw-rank">${rankStr}${rankNStr?' · <span style="color:var(--gold-d)">'+ rankNStr+'</span>':''}</div>
    </div>`;
  }
  h+='</div>';
  return h;
}

function goCategoria(key, el){
  document.querySelectorAll('.cat-tab').forEach(t=>t.classList.remove('act'));
  document.querySelectorAll('.cat-sec').forEach(s=>s.classList.remove('act'));
  el.classList.add('act');
  document.getElementById('cat-'+key).classList.add('act');
  selCat=key; selSwIdx=null;
  document.getElementById('sw-detail').style.display='none';
  document.getElementById('sw-detail').innerHTML='';
}

function selectSwimmer(catKey, idx){
  selSwIdx=idx;
  // Deselect all cards in this cat
  const cat=DATA.categorias[catKey];
  for(let i=0;i<cat.swimmers.length;i++){
    const card=document.getElementById('swcard-'+catKey+'-'+i);
    if(card) card.classList.remove('sel');
  }
  const selCard=document.getElementById('swcard-'+catKey+'-'+idx);
  if(selCard) selCard.classList.add('sel');

  const sw=cat.swimmers[idx];
  const det=document.getElementById('sw-detail');
  det.style.display='block';
  det.innerHTML=buildSwimmerDetail(catKey, sw, cat.eventos, cat.pruebas);
  det.scrollIntoView({behavior:'smooth',block:'start'});
}

// ── Swimmer Detail ────────────────────────────────────────────────────────────
function buildSwimmerDetail(catKey, sw, eventos, pruebas){
  const col = CAT_COLORS[catKey];
  const s   = sw.sum;

  // Header
  let h=`<div class="sw-det-hdr">
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <h2 style="color:${col}">${sw.nombre}</h2>
      <div class="pills" style="margin:0">
        <span class="pill" style="background:${col}22;color:${col}">${s.np} prueba${s.np!==1?'s':''}</span>
        ${s.bra?'<span class="pill" style="background:var(--gold-l);color:var(--gold-d)">Mejor AND #'+s.bra+'</span>':''}
        ${s.bro?'<span class="pill pb">Mejor ORI #'+s.bro+'</span>':''}
        ${s.brn?'<span class="pill" style="background:var(--blue-l);color:var(--blue)">#'+s.brn+' España · '+s.bpn+'</span>':''}
      </div>
    </div>
    <div style="font-size:.8rem;color:var(--soft);margin-top:6px">
      C.N. Axarquía · Zona Oriental (Málaga) · Temporada 2025–2026
    </div>
  </div>`;

  // Sub-tabs
  const uid = sw.nombre.replace(/\s+/g,'_');
  h+=`<div class="sw-det-body">
    <div class="sub-tabs">
      <button class="sub-tab act" onclick="goSubTab('${uid}','pruebas',this)">📋 Mis Pruebas</button>
      <button class="sub-tab" onclick="goSubTab('${uid}','analisis',this)">📊 Análisis</button>
      <button class="sub-tab" onclick="goSubTab('${uid}','zona',this)">🗺 Zona AND</button>
    </div>`;

  // Build sub sections
  h+=`<div class="sub-sec act" id="sub-${uid}-pruebas">${buildPruebasTab(sw, eventos, pruebas)}</div>`;
  h+=`<div class="sub-sec" id="sub-${uid}-analisis">${buildAnalisisTab(sw, eventos)}</div>`;
  h+=`<div class="sub-sec" id="sub-${uid}-zona">${buildZonaTab(sw, eventos)}</div>`;

  h+='</div>';  // sw-det-body
  return h;
}

function goSubTab(uid, tab, el){
  const body = el.closest('.sw-det-body');
  body.querySelectorAll('.sub-tab').forEach(t=>t.classList.remove('act'));
  body.querySelectorAll('.sub-sec').forEach(s=>s.classList.remove('act'));
  el.classList.add('act');
  const sec = document.getElementById('sub-'+uid+'-'+tab);
  if(sec) sec.classList.add('act');
}

// ── Pruebas tab ───────────────────────────────────────────────────────────────
function buildPruebasTab(sw, eventos, pruebas){
  const rMap={};
  for(const r of sw.races) rMap[r.prueba]=r;

  let h='<div class="tbl-wrap"><table class="ct"><thead><tr>'+
    '<th>Prueba</th><th>Marca</th><th>Rank España</th>'+
    '<th>Rank Andalucía</th><th>Rank Oriental</th>'+
    '<th>Dif. al 1º AND</th></tr></thead><tbody>';

  for(const p of pruebas){
    const r=rMap[p];
    if(r){
      const difStr = r.ld_and!==null ? fmtDif(r.ld_and) : '—';
      const difCls = r.ld_and>0?'dn':'';
      h+=`<tr class="ax">
        <td><strong>${p}</strong></td>
        <td class="tt">${r.m}</td>
        <td>${r.rn}/${r.tn}</td>
        <td><strong>${r.ra}</strong>/${r.ta}</td>
        <td><strong>${r.ro}</strong>/${r.to}</td>
        <td class="${difCls}">${difStr}</td>
      </tr>`;
    } else {
      const ev=eventos[p];
      const top1=ev&&ev.and.length>0?ev.and[0]:null;
      h+=`<tr class="nm">
        <td>${p}</td>
        <td colspan="4">Sin marca registrada</td>
        <td>${top1?'1º AND: '+top1.m:'—'}</td>
      </tr>`;
    }
  }
  h+='</tbody></table></div>';
  return h;
}

// ── Análisis tab ──────────────────────────────────────────────────────────────
function buildAnalisisTab(sw, eventos){
  if(sw.races.length===0)
    return'<p style="color:var(--mid);padding:16px">Sin marcas registradas.</p>';

  let h='<div class="co co-gold" style="margin-bottom:14px">'+
    '📊 <strong>Comparación por prueba</strong> · Las barras muestran la posición relativa '+
    'de este nadador respecto al líder de Andalucía y al nadador inmediatamente por delante. '+
    '<em>Negativo = ese nadador es más rápido.</em></div>';

  for(const r of sw.races){
    const ev = eventos[r.prueba];
    const listAnd = ev ? ev.and : [];
    const listOri = ev ? ev.ori : [];

    // Find swimmer position in AND list
    const idxInAnd = listAnd.findIndex(s=>s.ax!==null && s.n.toUpperCase()===sw.nombre.toUpperCase());
    const delante  = idxInAnd>0 ? listAnd[idxInAnd-1] : (listAnd.length>0?listAnd[0]:null);
    const top_and  = listAnd.length>0?listAnd[0]:null;
    const top_ori  = listOri.length>0?listOri[0]:null;

    // Base para barras
    const maxCs = ev && listAnd.length>=5
      ? Math.max(...listAnd.slice(0,8).map(s=>s.cs))
      : r.cs*1.05;
    const minCs = top_and ? top_and.cs : r.cs;
    const rng   = maxCs-minCs||1;
    function pct(cs){ return Math.min(100,Math.max(1,((cs-minCs)/rng)*100)).toFixed(1); }

    h+=`<div class="ana-block">
      <div class="ana-title">${r.prueba}
        <span class="ana-rnk">Puesto <strong>#${r.ra}</strong> de ${r.ta} en AND · <strong>#${r.ro}</strong> de ${r.to} en ORI · <strong>#${r.rn}</strong>🇪🇸</span>
      </div>`;

    // Barra 1º AND
    if(top_and){
      const dStr=fmtDif(r.ld_and);
      h+=`<div class="cmp-row">
        <div class="cmp-info"><strong>🥇 1º AND</strong><span>${top_and.n} · ${top_and.p}</span></div>
        <div class="bar-wrap"><div class="bar bar-g" style="width:1%"></div></div>
        <div class="cmp-t">${top_and.m}</div>
        <span class="dif-b db-r">${dStr}</span>
      </div>`;
    }

    // Barra 1º ORI (si distinto del 1º AND)
    if(top_ori && top_ori.cs !== (top_and?top_and.cs:null)){
      const dOri = fmtDif(r.ld_ori);
      h+=`<div class="cmp-row">
        <div class="cmp-info"><strong>🔵 1º ORI</strong><span>${top_ori.n} · ${top_ori.p}</span></div>
        <div class="bar-wrap"><div class="bar" style="background:#bfdbfe;width:${pct(top_ori.cs)}%"></div></div>
        <div class="cmp-t">${top_ori.m}</div>
        <span class="dif-b db-r">${dOri}</span>
      </div>`;
    }

    // Barra nadador delante
    if(r.ra>1 && r.delante){
      const difD = fmtDif(r.delante.dif);
      h+=`<div class="cmp-row">
        <div class="cmp-info"><strong>#${r.ra-1} AND</strong><span>${r.delante.n}</span><span>${r.delante.c}</span></div>
        <div class="bar-wrap"><div class="bar bar-ldr" style="width:${pct(r.delante.cs)}%"></div></div>
        <div class="cmp-t">${r.delante.dif!==null?(r.delante.cs/100).toFixed(2):''}</div>
        <span class="dif-b db-r">−${(r.delante.dif/100).toFixed(2)}s para subir</span>
      </div>`;
    }

    // Barra NADADOR (★)
    const rankLabel = r.ra===1?'🥇 LÍDER AND':'#'+r.ra+' AND';
    h+=`<div class="cmp-row" style="background:var(--gold-l);border-radius:6px;padding:3px 6px">
      <div class="cmp-info"><strong>★ ${sw.nombre.split(' ')[0]}</strong><span>C.N. Axarquía</span></div>
      <div class="bar-wrap"><div class="bar bar-b" style="width:${pct(r.cs)}%"></div></div>
      <div class="cmp-t">${r.m}</div>
      <span class="dif-b db-gold">${rankLabel}</span>
    </div>`;

    // Barra nadador detrás
    const detras = ev && listAnd.length>0
      ? listAnd.find(s=>s.cs>r.cs && !(s.ax!==null&&s.n.toUpperCase()===sw.nombre.toUpperCase()))
      : null;
    if(detras){
      const difDet = detras.cs - r.cs;
      h+=`<div class="cmp-row">
        <div class="cmp-info"><strong>#${r.ra+1} AND</strong><span>${detras.n}</span><span>${detras.c}</span></div>
        <div class="bar-wrap"><div class="bar bar-nx" style="width:${pct(detras.cs)}%"></div></div>
        <div class="cmp-t">${detras.m}</div>
        <span class="dif-b db-g">+${(difDet/100).toFixed(2)}s de ventaja</span>
      </div>`;
    }

    // Texto análisis
    h+='<div style="margin-top:8px">';
    if(r.ra===1)
      h+=`<div class="co co-green">🏆 <strong>Líder de Andalucía</strong> en ${r.prueba}. Referente en la zona.</div>`;
    else if(r.ra<=3)
      h+=`<div class="co co-green">🌟 <strong>Puesto #${r.ra} de Andalucía</strong> · ${r.ra===2?'A':r.ra===3?'Bronce de':'Top de'} Andalucía.</div>`;
    else if(r.delante){
      const seg = (r.delante.dif/100).toFixed(2);
      h+=`<div class="co co-blue">💡 Para subir al puesto <strong>#${r.ra-1}</strong>: mejorar <strong>${seg}s</strong> · Superar a <strong>${r.delante.n}</strong> (${r.delante.c})</div>`;
    }
    if(r.rn<=5)
      h+=`<div class="co co-gold">⭐ <strong>Top ${r.rn} de España</strong> en ${r.prueba} · Referente nacional.</div>`;
    else if(r.rn<=10)
      h+=`<div class="co co-blue">📈 <strong>Top 10 nacional (#${r.rn})</strong> en ${r.prueba}.</div>`;
    h+='</div></div>';  // close text + ana-block
  }

  // Pruebas sin marca
  const rMap2={};
  for(const r of sw.races) rMap2[r.prueba]=true;
  const sinM = Object.keys(eventos).filter(p=>!rMap2[p]);
  if(sinM.length>0){
    h+=`<div class="sh">Pruebas sin marca esta temporada</div>`;
    h+=`<div class="co co-orange">`;
    for(const p of sinM){
      const top=eventos[p]&&eventos[p].and.length>0?eventos[p].and[0]:null;
      h+=`<strong>${p}</strong>`;
      if(top) h+=` — 1º AND: ${top.m} (${top.n})`;
      h+='<br>';
    }
    h+='</div>';
  }

  return h;
}

// ── Zona AND tab ──────────────────────────────────────────────────────────────
function buildZonaTab(sw, eventos){
  let h='<div class="co co-blue" style="margin-bottom:12px">'+
    '🗺 <strong>Ranking de Andalucía por prueba</strong> · '+
    '<span class="zo zo-ori">🔵 Oriental</span> = Málaga/Granada/Jaén/Almería · '+
    '<span class="zo zo-occ">🟠 Occidental</span> = Córdoba/Sevilla/Cádiz/Huelva · '+
    'Fila dorada = este nadador.</div>';

  const myName = sw.nombre.toUpperCase();

  for(const r of sw.races){
    const ev = eventos[r.prueba];
    if(!ev) continue;
    h+=`<div class="sh">${r.prueba} <span style="font-size:.75rem;color:var(--soft);font-weight:400">${ev.ta} AND · ${ev.to} ORI · ${ev.toc} OCC</span></div>`;
    h+='<div class="tbl-wrap"><table class="ct"><thead><tr>'+
      '<th>#AND</th><th>Nombre</th><th>Club</th><th>Zona</th>'+
      '<th>Marca</th><th>Dif. vs ti</th></tr></thead><tbody>';

    for(const s of ev.and){
      const isMe = s.n.toUpperCase()===myName;
      const cls  = isMe?' class="ax"':'';
      const rb   = `<span class="${rbCls(s.r)}">${s.r}</span>`;
      const dif  = difCell(s.d, isMe);
      h+=`<tr${cls}>
        <td>${rb}</td>
        <td>${s.n}${isMe?' <strong style="color:var(--gold-d)">★ Tú</strong>':''}</td>
        <td style="font-size:.73rem">${s.c}</td>
        <td>${zBadge(s.z)}</td>
        <td class="tt">${s.m}</td>
        ${dif}
      </tr>`;
    }
    h+='</tbody></table></div>';
  }
  return h;
}

// ── Init ──────────────────────────────────────────────────────────────────────
renderHero();
renderCatTabs();
