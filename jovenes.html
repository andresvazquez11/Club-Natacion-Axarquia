<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>C.N. Axarquía · Jóvenes 2015/2016 · Campeonato Andalucía</title>
<style>
:root{
  --blue:#0055cc;--pink:#db2777;--green:#059669;--purple:#7c3aed;
  --gold:#ffd700;--gold2:#f59e0b;--gold-d:#92400e;--gold-l:rgba(255,215,0,.12);
  --soft:#64748b;--border:rgba(255,255,255,.08);
  --bg:#07091a;--card:rgba(255,255,255,.04);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:#e2e8f0;font-size:15px;overflow-x:hidden}

/* ── Stars ── */
#stars-canvas{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.6}

/* ── Waves ── */
.waves{position:fixed;bottom:0;left:0;right:0;height:140px;pointer-events:none;z-index:0;overflow:hidden}
.wave{position:absolute;bottom:0;left:-100%;width:300%;border-radius:40%}
.w1{height:80px;background:rgba(14,165,233,.07);animation:wv 9s linear infinite}
.w2{height:60px;background:rgba(6,182,212,.04);animation:wv 14s linear infinite reverse;bottom:-8px}
@keyframes wv{from{transform:translateX(0)}to{transform:translateX(33%)}}

/* ── Confetti ── */
#confetti{position:fixed;top:0;left:0;right:0;pointer-events:none;z-index:100}
.confetto{position:absolute;width:7px;height:7px;border-radius:2px;animation:cf var(--d,3s) var(--dl,0s) ease-in both}
@keyframes cf{0%{transform:translateY(-10px) rotate(0) translateX(0);opacity:1}100%{transform:translateY(700px) rotate(720deg) translateX(var(--dx,20px));opacity:0}}

/* ── Layout ── */
.page{position:relative;z-index:1;max-width:980px;margin:0 auto;padding:0 12px 120px}

/* ── Hero ── */
.hero{text-align:center;padding:28px 12px 18px}
.hero-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(124,58,237,.2);border:1px solid rgba(167,139,250,.3);border-radius:20px;padding:4px 14px;font-size:.72rem;font-weight:700;color:#a78bfa;margin-bottom:10px}
.hero-title{font-size:2rem;font-weight:900;letter-spacing:-.5px;line-height:1.1;margin-bottom:4px}
.hero-title span{background:linear-gradient(90deg,#a78bfa,#38bdf8,#34d399,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{font-size:.82rem;color:var(--soft);margin-bottom:16px}
.sc-grid{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.sc{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:10px;padding:12px 16px;min-width:80px;text-align:center}
.sc .val{font-size:1.4rem;font-weight:800;color:#e2e8f0}
.sc .lbl{font-size:.65rem;color:var(--soft);margin-top:1px}

/* ── Highlights strip ── */
.hl-strip{display:flex;gap:8px;overflow-x:auto;padding:6px 0 10px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.hl-strip::-webkit-scrollbar{display:none}
.hl-item{flex-shrink:0;display:flex;align-items:center;gap:7px;padding:6px 12px;border-radius:20px;font-size:.72rem;border:1px solid var(--border);cursor:default;transition:.2s;white-space:nowrap}
.hl-n1{background:rgba(255,215,0,.12);border-color:rgba(255,215,0,.3)}
.hl-top5{background:rgba(167,139,250,.1);border-color:rgba(167,139,250,.25)}
.hl-top10{background:rgba(56,189,248,.08);border-color:rgba(56,189,248,.2)}
.hl-rank{font-weight:800;font-size:.78rem}

/* ── Category tabs ── */
.cat-tabs{display:flex;background:rgba(255,255,255,.03);border-radius:10px;padding:4px;margin:10px 0;border:1px solid var(--border);overflow-x:auto}
.cat-tab{flex:1;min-width:110px;padding:10px 6px;border-radius:7px;border:none;background:transparent;font-size:.76rem;font-weight:700;cursor:pointer;color:var(--soft);transition:.2s;text-align:center}
.cat-tab:hover{background:rgba(255,255,255,.04);color:#cbd5e1}
.cat-tab.act{background:rgba(255,255,255,.08);color:#e2e8f0;box-shadow:0 0 0 1px rgba(255,255,255,.1)}
.cat-tab#ctab-relay{min-width:90px;color:#0891b2}
.cat-tab#ctab-relay.act{background:rgba(8,145,178,.15);color:#38bdf8}
.cat-sec{display:none;padding:14px 0}
.cat-sec.act{display:block}
.rel-sec{display:none;padding:14px 0}
.rel-sec.act{display:block}

/* ── Swimmer cards ── */
.sw-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:10px;margin-bottom:12px}
.sw-card{border-radius:12px;padding:12px;cursor:pointer;transition:transform .2s,box-shadow .2s;position:relative;overflow:hidden;border:1px solid var(--border);background:var(--card);animation:cardIn .5s var(--ci,0s) both}
@keyframes cardIn{from{opacity:0;transform:translateY(16px) scale(.96)}to{opacity:1;transform:none}}
.sw-card::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at top right,var(--cg,rgba(255,255,255,.05)),transparent 70%);pointer-events:none}
.sw-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.4),0 0 0 1px var(--cc,rgba(255,255,255,.15))}
.sw-card.sel{border-color:var(--cc,#fff);box-shadow:0 0 0 2px var(--cc,#fff),0 8px 24px rgba(0,0,0,.4)}
.sw-rank-big{font-size:1.8rem;font-weight:900;line-height:1;color:var(--cc,#e2e8f0)}
.sw-rank-lbl{font-size:.55rem;color:var(--soft);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.sw-name{font-size:.8rem;font-weight:700;color:#e2e8f0;margin-bottom:2px;line-height:1.2}
.sw-year{font-size:.62rem;color:var(--soft);margin-bottom:6px}
.sw-badges{display:flex;flex-wrap:wrap;gap:3px}
.sw-badge{font-size:.58rem;padding:2px 6px;border-radius:6px;font-weight:700}

/* ── Swimmer detail ── */
.sw-detail{border-radius:12px;margin:6px 0 12px;border:1px solid var(--border);background:rgba(255,255,255,.02);overflow:hidden}
.sw-detail-header{padding:14px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
.sdh-emoji{font-size:1.6rem}
.sdh-name{font-size:1rem;font-weight:800;color:#e2e8f0}
.sdh-meta{font-size:.72rem;color:var(--soft)}
.sub-tabs{display:flex;border-bottom:1px solid var(--border);background:rgba(255,255,255,.02);overflow-x:auto}
.sub-tab{padding:10px 16px;border:none;background:none;font-size:.78rem;font-weight:600;cursor:pointer;color:var(--soft);border-bottom:2px solid transparent;white-space:nowrap;transition:.15s}
.sub-tab.act{color:#e2e8f0;border-bottom-color:var(--cc,#38bdf8)}
.sub-body{padding:14px 12px}

/* ── Pruebas table ── */
.comp-table{width:100%;border-collapse:collapse;font-size:.76rem}
.comp-table th{padding:7px 10px;text-align:left;border-bottom:1px solid var(--border);color:var(--soft);font-size:.67rem;text-transform:uppercase;letter-spacing:.4px}
.comp-table td{padding:7px 10px;border-bottom:1px solid rgba(255,255,255,.04)}
.comp-table tr:last-child td{border-bottom:none}
.comp-table .tt{font-family:monospace;font-weight:700;color:#e2e8f0}
.no-mark{color:var(--soft);font-style:italic}
.rank-chip{display:inline-flex;align-items:center;padding:2px 7px;border-radius:8px;font-size:.62rem;font-weight:700;gap:3px}
.rc-and{background:rgba(56,189,248,.15);color:#38bdf8}
.rc-ori{background:rgba(52,211,153,.12);color:#34d399}
.rc-nac{background:rgba(255,215,0,.12);color:#ffd700}

/* ── Race track (analysis) ── */
.race-list{display:flex;flex-direction:column;gap:14px}
.race-block{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.race-block-header{padding:10px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;border-bottom:1px solid rgba(255,255,255,.06)}
.rbt-prueba{font-size:.88rem;font-weight:800;color:#e2e8f0}
.rbt-chips{display:flex;gap:4px;flex-wrap:wrap;margin-left:auto}
.race-track{padding:10px 12px}
.race-lane{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.race-lane:last-child{border-bottom:none}
.race-lane.ax-lane{background:rgba(255,215,0,.04);border-radius:6px;padding:5px 6px;border:none;border-bottom:none;margin:1px -2px}
.lane-pos{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:800;flex-shrink:0}
.lp1{background:#ffd700;color:#000}
.lp2{background:rgba(255,255,255,.12);color:#e2e8f0}
.lp3{background:rgba(249,115,22,.3);color:#fb923c}
.lpn{background:rgba(255,255,255,.06);color:var(--soft)}
.lane-info{flex:1;min-width:0}
.lane-name{font-size:.74rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lane-club-name{font-size:.6rem;color:var(--soft)}
.lane-bar-wrap{width:110px;flex-shrink:0}
@media(max-width:500px){.lane-bar-wrap{width:60px}}
.lane-bar{height:10px;background:rgba(255,255,255,.06);border-radius:5px;overflow:hidden}
.lane-fill{height:100%;border-radius:5px;animation:barIn 1.2s var(--d,.3s) cubic-bezier(.22,1,.36,1) both;transform-origin:left;transform:scaleX(0)}
@keyframes barIn{from{transform:scaleX(0)}to{transform:scaleX(1)}}
.lf-ax{background:linear-gradient(90deg,#ffd700,#f59e0b);box-shadow:0 0 8px rgba(255,215,0,.4)}
.lf-1{background:linear-gradient(90deg,#38bdf8,#0ea5e9)}
.lf-2{background:rgba(100,116,139,.6)}
.lf-n{background:rgba(71,85,105,.4)}
.lane-stats{display:flex;flex-direction:column;align-items:flex-end;justify-content:center;flex-shrink:0;width:78px;gap:2px}
@media(max-width:500px){.lane-stats{width:64px}}
.lane-time{font-family:monospace;font-size:.78rem;font-weight:700;white-space:nowrap;text-align:right;color:#e2e8f0}
.lane-delta{font-size:.62rem;font-weight:700;white-space:nowrap;text-align:right;font-family:monospace}
.ld-leader{color:#ffd700}
.ld-close{color:#34d399}
.ld-behind{color:#ef4444}

/* ── Improve callout ── */
.improve-box{margin:10px 12px 10px;padding:10px 12px;background:rgba(56,189,248,.06);border:1px solid rgba(56,189,248,.15);border-radius:8px;font-size:.75rem}
.improve-box strong{color:#38bdf8}
.leader-box{margin:10px 12px 10px;padding:8px 12px;background:rgba(255,215,0,.06);border:1px solid rgba(255,215,0,.2);border-radius:8px;font-size:.78rem;font-weight:700;color:#ffd700;display:flex;align-items:center;gap:6px}

/* ── No-mark events ── */
.nomark-section{padding:0 12px 12px}
.nomark-title{font-size:.72rem;color:var(--soft);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.nomark-list{display:flex;flex-wrap:wrap;gap:5px}
.nomark-item{font-size:.7rem;padding:4px 10px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;color:var(--soft)}

/* ── Zone table ── */
.tbl-wrap{overflow-x:auto}
table.ct{width:100%;border-collapse:collapse;font-size:.74rem}
table.ct th{padding:6px 8px;text-align:left;border-bottom:1px solid var(--border);color:var(--soft);font-size:.65rem;text-transform:uppercase;letter-spacing:.4px}
table.ct td{padding:6px 8px;border-bottom:1px solid rgba(255,255,255,.04)}
table.ct tr:last-child td{border-bottom:none}
table.ct tr.ax{background:rgba(255,215,0,.07)}
.rb{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;font-size:.65rem;font-weight:800}
.rb1{background:#ffd700;color:#000}.rb2{background:rgba(255,255,255,.15);color:#e2e8f0}
.rb3{background:rgba(249,115,22,.3);color:#fb923c}.rbn{background:rgba(255,255,255,.05);color:var(--soft)}
.zo-ori{display:inline-flex;align-items:center;gap:3px;font-size:.62rem;padding:1px 6px;border-radius:6px;background:rgba(56,189,248,.12);color:#38bdf8;font-weight:600}
.zo-occ{display:inline-flex;align-items:center;gap:3px;font-size:.62rem;padding:1px 6px;border-radius:6px;background:rgba(251,146,60,.12);color:#fb923c;font-weight:600}
.sh{font-size:.78rem;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:.6px;padding:10px 0 6px;display:flex;align-items:center;gap:8px}
.sh::after{content:'';flex:1;height:1px;background:var(--border)}
.dn{color:#ef4444;font-family:monospace;font-size:.7rem}
.dp{color:#22c55e;font-family:monospace;font-size:.7rem}
.tt{font-family:monospace;font-weight:700}

/* ── Relay (reuse) ── */
.rel-nav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.rel-etab{padding:6px 14px;border-radius:16px;border:1px solid rgba(56,189,248,.3);background:rgba(56,189,248,.06);font-size:.76rem;font-weight:700;cursor:pointer;color:#38bdf8;transition:.15s}
.rel-etab.act{background:rgba(56,189,248,.2);border-color:#38bdf8}
.rel-gtog{display:flex;gap:8px;margin-bottom:12px}
.rgtog{padding:5px 18px;border-radius:20px;border:1px solid var(--border);background:rgba(255,255,255,.04);font-size:.78rem;font-weight:700;cursor:pointer;color:var(--soft);transition:.15s}
.rgtog.gm{background:rgba(0,85,204,.3);color:#60a5fa;border-color:rgba(0,85,204,.4)}
.rgtog.gf{background:rgba(219,39,119,.25);color:#f472b6;border-color:rgba(219,39,119,.35)}
.rel-zones{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:640px){.rel-zones{grid-template-columns:1fr}}
.rel-zone-hdr{font-size:.78rem;font-weight:800;padding:8px 10px;border-radius:7px 7px 0 0;display:flex;align-items:center;gap:5px}
.rel-zone-hdr.ori{background:rgba(30,64,175,.2);color:#60a5fa;border:1px solid rgba(30,64,175,.3)}
.rel-zone-hdr.occ{background:rgba(124,58,237,.15);color:#a78bfa;border:1px solid rgba(124,58,237,.25)}
.rel-zone-hdr .cnt{font-weight:400;font-size:.68rem;margin-left:auto;color:var(--soft)}
.rel-tbl-wrap{overflow-x:auto;border:1px solid var(--border);border-top:none;border-radius:0 0 7px 7px}
table.rlt{width:100%;border-collapse:collapse;font-size:.72rem}
table.rlt th{padding:5px 7px;text-align:left;background:rgba(255,255,255,.02);border-bottom:1px solid var(--border);color:var(--soft);font-size:.63rem;text-transform:uppercase;letter-spacing:.4px}
table.rlt td{padding:5px 7px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:top}
table.rlt tr:last-child td{border-bottom:none}
table.rlt tr.rlax{background:rgba(255,215,0,.06)}
.rlcname{font-size:.74rem;font-weight:700;color:#e2e8f0}
.rlcprov{font-size:.62rem;color:var(--soft)}
.rltt{font-family:monospace;font-weight:800;font-size:.8rem;color:#e2e8f0;white-space:nowrap}
.rl-sw{min-width:65px}
.rl-swn{font-size:.66rem;font-weight:600;display:block;line-height:1.3;color:#e2e8f0}
.rl-swm{font-family:monospace;font-size:.63rem;color:var(--soft);display:block}
.rl-swy{font-size:.56rem;color:#475569}
.rl-estlbl{display:block;font-size:.58rem;font-weight:800;color:#38bdf8;text-transform:uppercase;margin-bottom:1px}
.rl-nodata{text-align:center;color:var(--soft);font-size:.75rem;font-style:italic;padding:16px}
.ax-relay-box{background:rgba(255,215,0,.05);border:1px solid rgba(255,215,0,.2);border-radius:10px;padding:14px;margin-bottom:14px}
.ax-relay-box h3{color:#ffd700;font-size:.88rem;font-weight:800;margin-bottom:10px}
.ax-relay-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px}
.ax-rc{background:rgba(255,255,255,.03);border-radius:8px;padding:10px 12px;border:1px solid rgba(255,215,0,.15)}
.ax-rc .arc-lbl{font-size:.63rem;font-weight:800;color:#f59e0b;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.ax-rc .arc-time{font-size:1.1rem;font-weight:800;font-family:monospace;color:#ffd700;margin-bottom:6px}
.ax-rc .arc-time small{font-size:.6rem;font-weight:400;color:var(--soft);margin-left:3px}
.arc-sw{display:flex;align-items:center;gap:4px;font-size:.68rem;padding:3px 0;border-top:1px solid rgba(255,215,0,.08)}
.arc-est{font-weight:800;color:#38bdf8;width:24px;font-size:.62rem;flex-shrink:0}
.arc-sn{flex:1;font-weight:600;color:#e2e8f0}
.arc-m{font-family:monospace;color:var(--soft)}
.arc-yr{font-size:.56rem;background:rgba(255,255,255,.06);padding:1px 3px;border-radius:3px;color:var(--soft)}
.arc-notel{color:var(--soft);font-size:.74rem;font-style:italic;padding:4px 0}

/* ── Callouts ── */
.co{padding:8px 12px;border-radius:7px;font-size:.76rem;margin:4px 0}
.co-blue{background:rgba(56,189,248,.08);border-left:3px solid #38bdf8;color:#bae6fd}
.co-green{background:rgba(52,211,153,.08);border-left:3px solid #34d399;color:#a7f3d0}
.co-gold{background:rgba(255,215,0,.08);border-left:3px solid #ffd700;color:#fde68a}
.co-orange{background:rgba(249,115,22,.08);border-left:3px solid #f97316;color:#fed7aa}

.footer{text-align:center;padding:20px;font-size:.7rem;color:var(--soft);border-top:1px solid var(--border);margin-top:20px}

@media(max-width:480px){
  .sw-grid{grid-template-columns:repeat(2,1fr)}
  .lane-bar-wrap{width:55px}
}
</style>
</head>
<body>
<canvas id="stars-canvas"></canvas>
<div class="waves"><div class="wave w1"></div><div class="wave w2"></div></div>
<div id="confetti"></div>

<div class="page">
  <div class="hero">
    <div class="hero-badge">🏊 TEMPORADA 2025-2026 · CAMPEONATO DE ANDALUCÍA</div>
    <h1 class="hero-title"><span>Club Natación Axarquía</span></h1>
    <div class="hero-sub">Jóvenes nadadores 2015 y 2016 · Análisis competitivo</div>
    <div class="sc-grid">
      <div class="sc"><div class="val" id="sc-sw">—</div><div class="lbl">Nadadores</div></div>
      <div class="sc"><div class="val" id="sc-n1">—</div><div class="lbl">#1 España</div></div>
      <div class="sc"><div class="val" id="sc-t5">—</div><div class="lbl">Top-5 nac.</div></div>
      <div class="sc"><div class="val">4</div><div class="lbl">Categorías</div></div>
    </div>
    <div class="hl-strip" id="hl-strip"></div>
  </div>

  <div class="cat-tabs" id="cat-tabs"></div>
  <div id="cat-sections"></div>
  <div id="relay-section" class="rel-sec"></div>

  <div style="max-width:960px;margin:0 auto">
    <div id="sw-detail"></div>
  </div>
</div>

(function(){

  var ctx=c.getContext('2d');
  var stars=[];
  function resize(){ c.width=window.innerWidth; c.height=window.innerHeight; }
  resize();
  window.addEventListener('resize',resize);
  for(var i=0;i<120;i++) stars.push({x:Math.random(),y:Math.random(),r:.5+Math.random()*1.2,t:Math.random()*Math.PI*2,s:.5+Math.random()*3});
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    var now=Date.now()/1000;
    for(var s of stars){
      var a=.15+.7*(.5+.5*Math.sin(now/s.s+s.t));
      ctx.beginPath();ctx.arc(s.x*c.width,s.y*c.height,s.r,0,6.28);
      ctx.fillStyle='rgba(255,255,255,'+a+')';ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

// ── Confetti ──────────────────────────────────────────────────────────────────
function launchConfetti(){
  var wrap=document.getElementById('confetti');
  wrap.innerHTML='';
  var colors=['#ffd700','#a78bfa','#38bdf8','#34d399','#fb923c','#f472b6'];
  for(var i=0;i<50;i++){
    var el=document.createElement('div');
    el.className='confetto';
    el.style.cssText='left:'+(15+Math.random()*70)+'%;background:'+colors[Math.floor(Math.random()*colors.length)]+';--d:'+(2+Math.random()*2)+'s;--dl:'+(Math.random()*2.5)+'s;--dx:'+((Math.random()-.5)*120)+'px;border-radius:'+(Math.random()>0.5?'50%':'2px');
    wrap.appendChild(el);
  }
}

// ── Utils ─────────────────────────────────────────────────────────────────────
var CAT_COLORS={'2015M':'#0055cc','2015F':'#db2777','2016M':'#059669','2016F':'#7c3aed'};
var CAT_GLOW={'2015M':'rgba(0,85,204,.25)','2015F':'rgba(219,39,119,.25)','2016M':'rgba(5,150,105,.25)','2016F':'rgba(124,58,237,.25)'};
var selCat=Object.keys(DATA.categorias)[0];
var selSwIdx=null;

function rbCls(r){ return r===1?'rb1':r===2?'rb2':r===3?'rb3':'rbn'; }
function zBadge(z){
  if(z==='Oriental') return '<span class="zo-ori">🔵 Ori.</span>';
  if(z==='Occidental') return '<span class="zo-occ">🟠 Occ.</span>';
  return z||'—';
}
function fmtDif(d){
  if(d===null||d===undefined) return'—';
  return(d>=0?'+':'-')+(Math.abs(d)/100).toFixed(2)+'s';
}
function difCell(d, isAx){
  if(isAx) return '<td style="color:#ffd700;font-weight:800">★</td>';
  if(d===null||d===undefined) return '<td>—</td>';
  return d<0?'<td class="dn">'+fmtDif(d)+'</td>':'<td class="dp">'+fmtDif(d)+'</td>';
}

    h+='</div></div>';

// ── Análisis / Race lanes ──────────────────────────────────────────────────────
function buildAnalisisTab(sw,eventos){
  if(!sw.races||!sw.races.length) return '<div class="co co-orange">Sin marcas registradas.</div>';
  var h='<div class="co co-blue" style="margin-bottom:12px">Barras de carrera: la más larga = más rápido. Fila dorada = tú. Cada nadador lleva su zona: <span class="zo-ori">🔵 Oriental</span> (Málaga/Granada/Jaén/Almería, tu zona) o <span class="zo-occ">🟠 Occidental</span> (Córdoba/Sevilla/Cádiz/Huelva).</div>';
  h+='<div class="race-list">';

  for(var r of sw.races){
    var ev=eventos[r.prueba];
    var listAnd=ev?ev.and:[];
    var topAnd=listAnd.length>0?listAnd[0]:null;
    var minCs=topAnd?topAnd.cs:r.cs;
    var refCs=listAnd.length>=5?listAnd[4].cs:r.cs*1.12;
    var rng=refCs-minCs||1;
    function barPct(cs){ return Math.max(8,Math.min(100,100-((cs-minCs)/rng)*80)); }

    h+='<div class="race-block">';
    h+='<div class="race-block-header"><span class="rbt-prueba">'+r.prueba+'</span>';
    h+='<div class="rbt-chips">';
    h+='<span class="rank-chip rc-and">#'+r.ra+' de '+r.ta+' Andalucía</span>';
    h+='<span class="rank-chip rc-ori">#'+r.ro+' Ori.</span>';
    h+='<span class="rank-chip rc-nac">#'+r.rn+' 🇪🇸</span>';
    h+='</div></div>';
    h+='<div class="race-track">';

    // Build display list: top 5 + always show this swimmer
    var display=[];
    var swIncluded=false;
    for(var ii=0;ii<Math.min(5,listAnd.length);ii++){
      var s=listAnd[ii];
      var isMe=s.n.toUpperCase()===sw.nombre.toUpperCase();
      display.push({s:s,rank:ii+1,isMe:isMe});
      if(isMe) swIncluded=true;
    }
    if(!swIncluded){
      for(var jj=5;jj<listAnd.length;jj++){
        if(listAnd[jj].n.toUpperCase()===sw.nombre.toUpperCase()){
          display.push({s:listAnd[jj],rank:jj+1,isMe:true});
          break;
        }
      }
    }

    for(var di=0;di<display.length;di++){
      var d=display[di];
      var isMe=d.isMe;
      var pct=barPct(d.s.cs);
      var delay=(di*0.18+0.3).toFixed(2);
      var diff=d.s.cs-minCs;
      var diffStr=diff===0?'LÍDER':'+'+((diff)/100).toFixed(2)+'s';
      var diffCls=diff===0?'lane-delta ld-leader':diff<100?'lane-delta ld-close':'lane-delta ld-behind';
      var barCls=isMe?'lane-fill lf-ax':d.rank===1?'lane-fill lf-1':d.rank<=3?'lane-fill lf-2':'lane-fill lf-n';
      var posCls='lane-pos lp'+(d.rank<=3?d.rank:'n');
      var cls=isMe?'race-lane ax-lane':'race-lane';
      var clubShort=(d.s.c||'').replace('C.N. ','').replace('C.D.N. ','').replace('CLUB NATACION ','').slice(0,14);
      h+='<div class="'+cls+'">';
      h+='<div class="'+posCls+'">'+d.rank+'</div>';
      var zTag=d.s.z?(' <span style="opacity:.8">'+zBadge(d.s.z)+'</span>'):'';
      h+='<div class="lane-info"><div class="lane-name">'+(isMe?'⭐ ':'')+d.s.n.split(' ').slice(0,2).join(' ')+'</div><div class="lane-club-name">'+clubShort+zTag+'</div></div>';
      h+='<div class="lane-bar-wrap"><div class="lane-bar"><div class="'+barCls+'" style="width:'+pct+'%;--d:'+delay+'s"></div></div></div>';
      h+='<div class="lane-stats"><div class="lane-time">'+d.s.m+'</div><div class="'+diffCls+'">'+diffStr+'</div></div>';
      h+='</div>';
    }
    h+='</div>'; // race-track

    // Improve or leader callout
    if(r.ra===1){
      h+='<div class="leader-box">🏆 Líder de Andalucía en '+r.prueba+' · Referente en la zona.</div>';
    } else if(r.ra<=3){
      h+='<div class="leader-box" style="color:#34d399;border-color:rgba(52,211,153,.3);background:rgba(52,211,153,.06)">🌟 Puesto #'+r.ra+' de Andalucía</div>';
    } else if(r.delante){
      var seg=(r.delante.dif/100).toFixed(2);
      var rival=r.delante.n.split(' ').slice(0,2).join(' ');
      h+='<div class="improve-box">💡 Para subir a <strong>#'+(r.ra-1)+'</strong>: mejorar <strong>'+seg+'s</strong> · Superar a <strong>'+rival+'</strong></div>';
    }
    if(r.rn<=5) h+='<div class="co co-gold" style="margin:8px 12px 10px">⭐ <strong>Top '+r.rn+' de España</strong> en '+r.prueba+'</div>';
    else if(r.rn<=10) h+='<div class="co co-blue" style="margin:8px 12px 10px">📈 <strong>Top 10 nacional (#'+r.rn+')</strong></div>';

    h+='</div>'; // race-block
  }
  h+='</div>';
  return h;
}

// ── Zona tab ──────────────────────────────────────────────────────────────────
function buildZonaTab(sw,eventos){
  var myName=sw.nombre.toUpperCase();
  var h='<div class="co co-blue" style="margin-bottom:12px">🗺 Ranking Andalucía · <span class="zo-ori">🔵 Oriental</span> = Málaga/Granada/Jaén/Almería · <span class="zo-occ">🟠 Occidental</span> = Córdoba/Sevilla/Cádiz/Huelva · Fila dorada = tú.</div>';
  for(var r of sw.races){
    var ev=eventos[r.prueba];
    if(!ev) continue;
    h+='<div class="sh">'+r.prueba+' <span style="font-size:.72rem;color:var(--soft);font-weight:400;margin-left:4px">'+ev.ta+' Andalucía · '+ev.to+' Oriental · '+ev.toc+' Occidental</span></div>';
    h+='<div class="tbl-wrap"><table class="ct"><thead><tr><th>#Andalucía</th><th>Nombre</th><th>Club</th><th>Zona</th><th>Marca</th><th>Dif.</th></tr></thead><tbody>';
    for(var s of ev.and){
      var isMe=s.n.toUpperCase()===myName;
      var cls=isMe?' class="ax"':'';
      h+='<tr'+cls+'><td><span class="rb '+rbCls(s.r)+'">'+s.r+'</span></td>';
      h+='<td>'+(isMe?'<strong style="color:#ffd700">⭐ '+s.n+'</strong>':s.n)+'</td>';
      h+='<td style="font-size:.68rem">'+s.c+'</td>';
      h+='<td>'+zBadge(s.z)+'</td>';
      h+='<td class="tt">'+s.m+'</td>';
      h+=difCell(s.d,isMe)+'</tr>';
    }
    h+='</tbody></table></div>';
  }
  return h;
}
</script>
<script>
// ── Relay tab ─────────────────────────────────────────────────────────────────
var RELAY_META_J={'4x50L':{label:'4x50 Libre',est:false},'4x100L':{label:'4x100 Libre',est:false},'4x50E':{label:'4x50 Estilos',est:true,sl:['Esp.','Bra.','Mar.','Lib.']},'4x100E':{label:'4x100 Estilos',est:true,sl:['Esp.','Bra.','Mar.','Lib.']}};
var relayE='4x50L',relayG='M';

function relayGClick(el){
  var g=el.dataset.g;
  relayG=g;
  document.querySelectorAll('[data-axrg]').forEach(function(b){b.className='rgtog'+(b.dataset.g===g?(g==='M'?' gm':' gf'):'');});

  renderRelayZones();
}
function relayEClick(el){
  var k=el.dataset.k;
  relayE=k;
  document.querySelectorAll('.rel-etab').forEach(function(t){t.classList.remove('act');});
  el.classList.add('act');

}

function goRelay(el){

  document.querySelectorAll('.cat-sec').forEach(function(s){s.classList.remove('act');});

function renderRelaySection(){

  h+='<div class="rel-gtog">';
  h+='<button class="rgtog gm" data-axrg="1" data-g="M" onclick="relayGClick(this)">♂ Masculino</button>';
  h+='<button class="rgtog" data-axrg="1" data-g="F" onclick="relayGClick(this)">♀ Femenino</button>';
  h+='</div><div id="ax-relay-cards"></div></div>';
  h+='<div class="rel-nav" id="rel-enav"></div>';
  h+='<div class="rel-gtog">';
  h+='<button class="rgtog gm" data-relg="1" data-g="M" onclick="relayGClick(this)">♂ Masculino</button>';
  h+='<button class="rgtog" data-relg="1" data-g="F" onclick="relayGClick(this)">♀ Femenino</button>';

function rlRb(r){var c=r===1?'rb1':r===2?'rb2':r===3?'rb3':'rbn';return '<span class="rb '+c+'">'+r+'</span>';}

function renderAxRelayCards(){
  var cards=document.getElementById('ax-relay-cards');
  if(!cards) return;
  var h='<div class="ax-relay-grid">';
  for(var k in RELAY_META_J){
    var rm=RELAY_META_J[k];
    var ax=null;
    var d=DATA.relevos[relayG][k];
    for(var z of ['ori','occ']){ax=(d[z]||[]).find(function(c){return c.ax;});if(ax) break;}
    h+='<div class="ax-rc"><div class="arc-lbl">'+rm.label+'</div>';

      h+='<div class="arc-time">'+ax.total_m+'<small>tiempo total</small></div>';

        var sw=ax.nad[ni];
        var est=rm.est?sw.est:'#'+(ni+1);
        h+='<div class="arc-sw"><span class="arc-est">'+est+'</span><span class="arc-sn">'+sw.sn+'</span><span class="arc-yr">'+sw.año+'</span><span class="arc-m">'+sw.m+'</span></div>';
      }
    } else { h+='<div class="arc-notel">Sin equipo completo</div>'; }

  }

function renderRelayZones(){
  var zc=document.getElementById('rel-zones');
  if(!zc) return;
  var rm=RELAY_META_J[relayE];
  var d=DATA.relevos[relayG][relayE];
  var sl=rm.est?rm.sl:['Nad. 1','Nad. 2','Nad. 3','Nad. 4'];
  var h='';
  for(var zi=0;zi<2;zi++){
    var zk=zi===0?'ori':'occ';
    var zl=zi===0?'🔵 Zona Oriental':'🟠 Zona Occidental';
    var zcl=zi===0?'ori':'occ';
    var clubs=d[zk]||[];
    h+='<div><div class="rel-zone-hdr '+zcl+'">'+zl+'<span class="cnt">'+clubs.length+' clubes</span></div>';
    if(!clubs.length){h+='<div class="rl-nodata">Sin datos</div></div>';continue;}
    h+='<div class="rel-tbl-wrap"><table class="rlt"><thead><tr><th>#</th><th>Club</th><th>Total</th>';
    for(var si=0;si<sl.length;si++) h+='<th>'+sl[si]+'</th>';
    h+='</tr></thead><tbody>';
    for(var ci=0;ci<clubs.length;ci++){
      var c=clubs[ci];
      h+='<tr'+(c.ax?' class="rlax"':'')+'><td>'+rlRb(c.rank)+'</td><td><div class="rlcname">'+(c.ax?'⭐ ':'')+c.club+'</div><div class="rlcprov">'+c.prov+'</div></td><td class="rltt">'+c.total_m+'</td>';
      for(var ni2=0;ni2<4;ni2++){
        var sw=c.nad[ni2];
        if(!sw){h+='<td>—</td>';continue;}
        var eb=rm.est?'<span class="rl-estlbl">'+rm.sl[ni2]+'</span>':'';
        h+='<td class="rl-sw">'+eb+'<span class="rl-swn">'+sw.sn+'</span><span class="rl-swm">'+sw.m+'<span class="rl-swy"> '+sw.año+'</span></span></td>';
      }
      h+='</tr>';
    }
    h+='</tbody></table></div></div>';
  }
  zc.innerHTML=h;
}

// ── Init ──────────────────────────────────────────────────────────────────────
renderHero();
renderCatTabs();
</script>
